<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Romance Quest 8-Bits · Rescate de Giovanny</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrapper">
    <header class="hud">
      <h1>ROMANCE QUEST 8-BITS</h1>
      <p>Vivi + Wisky vs Maliketh · salva a Giovanny del Reino de los Pelos de Gato</p>
      <div class="stats">
        <div>Vivi HP: <span id="viviHp">100</span></div>
        <div>Wisky HP: <span id="wiskyHp">100</span></div>
        <div>Maliketh HP: <span id="malikethHp">220</span></div>
      </div>
    </header>

    <section class="stage-frame">
      <canvas id="game" width="960" height="540" aria-label="Mini videojuego romántico 2D"></canvas>
      <div class="controls-help">
        <strong>Controles:</strong>
        <span>WASD = mover a Vivi</span>
        <span>Flechas = mover a Wisky</span>
        <span>ESPACIO = ataque de Vivi (Ráfaga de Puños Tiernos)</span>
        <span>ENTER = ataque de Wisky (Arañazo)</span>
      </div>
    </section>

    <section id="log" class="log"></section>
    <section id="ending" class="ending hidden"></section>
    <button id="restart" class="restart">Reiniciar aventura</button>
  </main>

  <script type="module" src="sprites.js"></script>
  <script type="module" src="game.js"></script>
</body>
</html>
